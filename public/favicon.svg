<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background: #09090B -->
  <rect width="512" height="512" fill="#09090B" />
  
  <!-- Group holding the icon (Camera + Reel), filled with #DFE104 -->
  <g fill="#DFE104">
    <!-- Camera Body -->
    <path d="M 120 250 L 350 250 L 350 400 L 200 400 Z" />
    
    <!-- Camera Lens / Front -->
    <path d="M 370 280 L 450 230 L 450 370 L 370 320 Z" />
    
    <!-- Reel 1 (Left) -->
    <circle cx="180" cy="180" r="60" />
    <circle cx="180" cy="180" r="15" fill="#09090B" />
    <circle cx="150" cy="180" r="12" fill="#09090B" />
    <circle cx="210" cy="180" r="12" fill="#09090B" />
    <circle cx="180" cy="150" r="12" fill="#09090B" />
    <circle cx="180" cy="210" r="12" fill="#09090B" />
    
    <!-- Reel 2 (Right) -->
    <circle cx="310" cy="170" r="65" />
    <circle cx="310" cy="170" r="16" fill="#09090B" />
    <circle cx="270" cy="170" r="14" fill="#09090B" />
    <circle cx="350" cy="170" r="14" fill="#09090B" />
    <circle cx="310" cy="130" r="14" fill="#09090B" />
    <circle cx="310" cy="210" r="14" fill="#09090B" />
    
    <!-- Diagonal Dynamic Accent inside Camera Body -->
    <polygon points="180 380 330 250 350 250 200 380" fill="#09090B" />
    
    <!-- 4-point Stars -->
    <!-- Star 1 (Left) -->
    <path d="M 80 300 Q 100 300 100 280 Q 100 300 120 300 Q 100 300 100 320 Q 100 300 80 300 Z" />
    <!-- Star 2 (Top Right) -->
    <path d="M 400 150 Q 420 150 420 130 Q 420 150 440 150 Q 420 150 420 170 Q 420 150 400 150 Z" />
  </g>
  
  <!-- Zinc 400 (#A1A1AA) Accent: Film strip fragment -->
  <g fill="#A1A1AA">
    <path d="M 80 260 L 250 260 L 250 280 L 80 280 Z" />
    <rect x="90" y="265" width="10" height="10" fill="#09090B" />
    <rect x="110" y="265" width="10" height="10" fill="#09090B" />
    <rect x="130" y="265" width="10" height="10" fill="#09090B" />
    <rect x="150" y="265" width="10" height="10" fill="#09090B" />
    <rect x="170" y="265" width="10" height="10" fill="#09090B" />
    <rect x="190" y="265" width="10" height="10" fill="#09090B" />
    <rect x="210" y="265" width="10" height="10" fill="#09090B" />
    <rect x="230" y="265" width="10" height="10" fill="#09090B" />
  </g>
  
  <g fill="#A1A1AA">
    <path d="M 80 340 L 200 340 L 200 360 L 80 360 Z" />
    <rect x="90" y="345" width="10" height="10" fill="#09090B" />
    <rect x="110" y="345" width="10" height="10" fill="#09090B" />
    <rect x="130" y="345" width="10" height="10" fill="#09090B" />
    <rect x="150" y="345" width="10" height="10" fill="#09090B" />
    <rect x="170" y="345" width="10" height="10" fill="#09090B" />
    <rect x="190" y="345" width="10" height="10" fill="#09090B" />
  </g>
  
  <!-- White Star point -->
  <path d="M 380 210 Q 400 210 400 190 Q 400 210 420 210 Q 400 210 400 230 Q 400 210 380 210 Z" fill="#FAFAFA" />
</svg>
